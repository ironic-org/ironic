name: Release

on:
  push:
    branches: [release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect version
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT_VER=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1 | sed 's/^v//')
          echo "Cargo.toml version: $CURRENT_VER"
          echo "Latest git tag:     ${LATEST_TAG:-<none>}"
          if [ -z "$LATEST_TAG" ]; then
            echo "version=v$CURRENT_VER" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          HIGHER=$(printf '%s\n%s' "$CURRENT_VER" "$LATEST_TAG" | sort -V | tail -1)
          if [ "$HIGHER" = "$CURRENT_VER" ] && [ "$CURRENT_VER" != "$LATEST_TAG" ]; then
            echo "version=v$CURRENT_VER" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged (v$CURRENT_VER) — no release needed"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

  verify:
    needs: check-version
    if: needs.check-version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

      - name: cargo deny
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          cargo deny check

  publish:
    needs: [check-version, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('Cargo.lock') }}

      - name: Publish ironic-macros
        working-directory: crates/ironic-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Publish ironic
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify

      - name: Generate release notes
        id: changelog
        run: |
          echo "## What's Changed" > release-notes.md
          git log --oneline --no-merges $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD >> release-notes.md
          echo "release_notes_file=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          TAG="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
