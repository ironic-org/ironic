[advisories]
ignore = [
    "RUSTSEC-2023-0071",  # rsa: Marvin Attack - no fix available (transient via oauth2)
    "RUSTSEC-2026-0118",  # hickory-proto: NSEC3 loop - no fix available (transient via mongodb)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"

