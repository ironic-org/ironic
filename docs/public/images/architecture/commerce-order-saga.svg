<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Commerce order Saga flow</title>
  <desc id="desc">Animated diagram showing order, outbox, NATS, payment, inventory, invoice, notification, and compensation flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#059669" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f97316" />
      <stop offset="1" stop-color="#ef4444" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".14" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <style>
      .card { fill: #fff; stroke: #dbe3ef; stroke-width: 1.5; filter: url(#shadow); }
      .title { fill: #0f172a; font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #475569; font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #64748b; font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { fill: none; stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrow); }
      .bus { fill: #111827; }
      .pill { fill: #f1f5f9; stroke: #cbd5e1; }
      .pulse { opacity: 0; }
      .dot-ok { fill: url(#ok); }
      .dot-warn { fill: url(#warn); }
      @keyframes move-main {
        0%, 8% { offset-distance: 0%; opacity: 0; }
        12%, 82% { opacity: 1; }
        90%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes move-fail {
        0%, 54% { offset-distance: 0%; opacity: 0; }
        58%, 88% { opacity: 1; }
        96%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes glow {
        0%, 100% { opacity: .25; transform: scale(1); }
        50% { opacity: .75; transform: scale(1.08); }
      }
      #token1 { offset-path: path("M 154 142 C 238 142, 248 142, 332 142"); animation: move-main 5.5s linear infinite; }
      #token2 { offset-path: path("M 444 142 C 505 142, 520 204, 590 224"); animation: move-main 5.5s linear infinite .45s; }
      #token3 { offset-path: path("M 700 216 C 760 160, 790 108, 850 90"); animation: move-main 5.5s linear infinite .9s; }
      #token4 { offset-path: path("M 700 236 C 764 208, 790 186, 850 178"); animation: move-main 5.5s linear infinite 1.25s; }
      #token5 { offset-path: path("M 700 256 C 764 256, 785 256, 850 266"); animation: move-main 5.5s linear infinite 1.6s; }
      #token6 { offset-path: path("M 700 276 C 764 312, 790 344, 850 354"); animation: move-main 5.5s linear infinite 1.95s; }
      #token7 { offset-path: path("M 960 90 C 1016 90, 1016 420, 616 420 C 442 420, 402 318, 402 236"); animation: move-main 5.5s linear infinite 2.35s; }
      #tokenFail { offset-path: path("M 850 118 C 735 82, 578 82, 430 170"); animation: move-fail 5.5s linear infinite; }
      #busGlow { transform-origin: 620px 246px; animation: glow 2.2s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        #token1, #token2, #token3, #token4, #token5, #token6, #token7, #tokenFail, #busGlow { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1120" height="520" rx="28" fill="url(#bg)" />
  <text x="48" y="56" class="title" font-size="24">Commerce Order Saga</text>
  <text x="48" y="82" class="label">Order confirmation is coordinated with events, retries, and compensation instead of distributed transactions.</text>

  <path class="line" d="M154 142 C238 142 248 142 332 142" />
  <path class="line" d="M444 142 C505 142 520 204 590 224" />
  <path class="line" d="M700 216 C760 160 790 108 850 90" />
  <path class="line" d="M700 236 C764 208 790 186 850 178" />
  <path class="line" d="M700 256 C764 256 785 256 850 266" />
  <path class="line" d="M700 276 C764 312 790 344 850 354" />
  <path class="line" d="M960 90 C1016 90 1016 420 616 420 C442 420 402 318 402 236" />
  <path class="line" stroke="#fb7185" stroke-dasharray="8 8" d="M850 118 C735 82 578 82 430 170" />

  <g transform="translate(48 108)">
    <rect class="card" width="106" height="68" rx="12" />
    <circle cx="26" cy="34" r="12" fill="#dbeafe" />
    <path d="M21 34h10m-5-5v10" stroke="#2563eb" stroke-width="2" stroke-linecap="round" />
    <text x="48" y="30" class="title">Client</text>
    <text x="48" y="50" class="small">place order</text>
  </g>

  <g transform="translate(332 96)">
    <rect class="card" width="112" height="92" rx="14" />
    <rect x="18" y="18" width="76" height="22" rx="7" fill="#ecfdf5" stroke="#86efac" />
    <text x="30" y="34" class="small" fill="#047857">ACID</text>
    <text x="22" y="62" class="title">Order</text>
    <text x="22" y="80" class="small">PENDING</text>
  </g>

  <g transform="translate(340 206)">
    <rect class="pill" width="128" height="38" rx="19" />
    <text x="24" y="24" class="label">Outbox row</text>
  </g>

  <g transform="translate(570 196)">
    <circle id="busGlow" cx="50" cy="50" r="54" fill="#bfdbfe" />
    <circle class="bus" cx="50" cy="50" r="44" />
    <text x="20" y="46" fill="#fff" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="700">NATS</text>
    <text x="18" y="65" fill="#c7d2fe" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600">JetStream</text>
  </g>

  <g transform="translate(850 44)">
    <rect class="card" width="110" height="92" rx="14" />
    <circle cx="28" cy="29" r="13" fill="#e0f2fe" />
    <path d="M20 29h16m-13-6h10m-10 12h10" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" />
    <text x="22" y="62" class="title">Payment</text>
    <text x="22" y="80" class="small">auth capture</text>
  </g>

  <g transform="translate(850 140)">
    <rect class="card" width="110" height="92" rx="14" />
    <circle cx="28" cy="29" r="13" fill="#dcfce7" />
    <path d="M22 29l5 5 9-11" fill="none" stroke="#16a34a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="22" y="62" class="title">Inventory</text>
    <text x="22" y="80" class="small">reserve stock</text>
  </g>

  <g transform="translate(850 236)">
    <rect class="card" width="110" height="92" rx="14" />
    <circle cx="28" cy="29" r="13" fill="#fef3c7" />
    <path d="M24 22h9l5 5v13H24z" fill="none" stroke="#d97706" stroke-width="2" stroke-linejoin="round" />
    <text x="22" y="62" class="title">Invoice</text>
    <text x="22" y="80" class="small">generate</text>
  </g>

  <g transform="translate(850 332)">
    <rect class="card" width="110" height="92" rx="14" />
    <circle cx="28" cy="29" r="13" fill="#ede9fe" />
    <path d="M20 29h16m-16 0l7-6m-7 6l7 6" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="22" y="62" class="title">Notify</text>
    <text x="22" y="80" class="small">email sms push</text>
  </g>

  <g transform="translate(348 332)">
    <rect class="card" width="152" height="72" rx="14" />
    <text x="22" y="32" class="title">Confirmed</text>
    <text x="22" y="52" class="small">after required events</text>
  </g>

  <g transform="translate(236 54)">
    <rect fill="#fff7ed" stroke="#fdba74" width="246" height="44" rx="22" />
    <text x="18" y="28" class="label" fill="#9a3412">failure event triggers compensation</text>
  </g>

  <circle id="token1" class="dot-ok" r="8" />
  <circle id="token2" class="dot-ok" r="8" />
  <circle id="token3" class="dot-ok" r="8" />
  <circle id="token4" class="dot-ok" r="8" />
  <circle id="token5" class="dot-ok" r="8" />
  <circle id="token6" class="dot-ok" r="8" />
  <circle id="token7" class="dot-ok" r="8" />
  <circle id="tokenFail" class="dot-warn" r="8" />

  <g transform="translate(48 452)">
    <rect fill="#ffffff" stroke="#dbe3ef" width="1024" height="36" rx="18" />
    <circle cx="22" cy="18" r="6" fill="#10b981" />
    <text x="38" y="23" class="small">Success path: OrderPlaced -> PaymentAuthorized -> StockReserved -> InvoiceGenerated -> PaymentCaptured -> Confirmed</text>
    <circle cx="590" cy="18" r="6" fill="#f97316" />
    <text x="606" y="23" class="small">Failure path: retry, DLQ, release stock, cancel or manual review</text>
  </g>
</svg>
