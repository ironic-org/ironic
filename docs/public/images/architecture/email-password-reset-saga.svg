<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Password reset email saga architecture</title>
  <desc id="desc">Animated architecture diagram showing the password reset email saga from client request through gateway, auth, Postgres, NATS, notification, Resend, and delivery outcome events.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softShadow" x="-24%" y="-35%" width="148%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="subtleShadow" x="-18%" y="-25%" width="136%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#64748b"/>
    </marker>
    <style>
      .eyebrow { font: 800 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.4px; fill: #2563eb; }
      .title { font: 800 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .node-title { font: 800 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .node-meta { font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .node-small { font: 600 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .tiny { font: 800 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .label { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .panel { fill: rgba(255, 255, 255, 0.78); stroke: #dbeafe; stroke-width: 1.2; filter: url(#softShadow); }
      .node { fill: #ffffff; stroke: #dbeafe; stroke-width: 1.4; filter: url(#subtleShadow); }
      .node-blue { fill: url(#cardBlue); stroke: #bfdbfe; stroke-width: 1.4; filter: url(#subtleShadow); }
      .node-warm { fill: url(#cardWarm); stroke: #fed7aa; stroke-width: 1.4; filter: url(#subtleShadow); }
      .outcome { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1.4; filter: url(#subtleShadow); }
      .failure { fill: #fff1f2; stroke: #fecdd3; stroke-width: 1.4; filter: url(#subtleShadow); }
      .badge { fill: url(#accent); }
      .danger-badge { fill: url(#danger); }
      .main-line { stroke: #2563eb; stroke-width: 4; stroke-linecap: round; fill: none; marker-end: url(#arrowBlue); stroke-dasharray: 14 12; animation: dash 1.7s linear infinite; }
      .event-line { stroke: #64748b; stroke-width: 3; stroke-linecap: round; fill: none; marker-end: url(#arrowSlate); stroke-dasharray: 8 11; animation: dash 2.1s linear infinite; }
      .fail-line { stroke: #ef4444; stroke-width: 3.2; stroke-linecap: round; fill: none; marker-end: url(#arrowSlate); stroke-dasharray: 9 10; animation: dash 1.9s linear infinite; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; transform-origin: center; }
      .pulse-danger { animation: pulseDanger 2s ease-in-out infinite; transform-origin: center; }
      .packet-a { fill: #2563eb; opacity: 0; animation: packetMain 7s linear infinite; }
      .packet-b { fill: #0891b2; opacity: 0; animation: packetMain 7s linear infinite; animation-delay: 1.8s; }
      .packet-c { fill: #16a34a; opacity: 0; animation: packetOutcome 7s linear infinite; animation-delay: 4.4s; }
      .packet-d { fill: #ef4444; opacity: 0; animation: packetFailure 7s linear infinite; animation-delay: 5s; }
      @keyframes dash { to { stroke-dashoffset: -52; } }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.72; } 50% { transform: scale(1.28); opacity: 1; } }
      @keyframes pulseDanger { 0%, 100% { transform: scale(1); opacity: 0.64; } 50% { transform: scale(1.22); opacity: 1; } }
      @keyframes packetMain {
        0%, 8% { opacity: 0; transform: translate(150px, 350px); }
        11% { opacity: 1; transform: translate(150px, 350px); }
        23% { opacity: 1; transform: translate(338px, 350px); }
        35% { opacity: 1; transform: translate(526px, 350px); }
        47% { opacity: 1; transform: translate(714px, 350px); }
        59% { opacity: 1; transform: translate(902px, 350px); }
        71% { opacity: 1; transform: translate(1090px, 350px); }
        78%, 100% { opacity: 0; transform: translate(1210px, 350px); }
      }
      @keyframes packetOutcome {
        0%, 61% { opacity: 0; transform: translate(1090px, 350px); }
        66% { opacity: 1; transform: translate(1090px, 350px); }
        79% { opacity: 1; transform: translate(1032px, 520px); }
        88%, 100% { opacity: 0; transform: translate(760px, 520px); }
      }
      @keyframes packetFailure {
        0%, 62% { opacity: 0; transform: translate(1090px, 350px); }
        68% { opacity: 1; transform: translate(1090px, 350px); }
        82% { opacity: 1; transform: translate(980px, 176px); }
        91%, 100% { opacity: 0; transform: translate(740px, 176px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .main-line, .event-line, .fail-line, .pulse, .pulse-danger, .packet-a, .packet-b, .packet-c, .packet-d { animation: none; }
        .packet-a, .packet-b, .packet-c, .packet-d { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1440" height="720" rx="34" fill="url(#page)"/>
  <circle cx="1210" cy="90" r="128" fill="#dbeafe" opacity="0.38"/>
  <circle cx="120" cy="630" r="160" fill="#ccfbf1" opacity="0.28"/>

  <rect class="panel" x="42" y="34" width="1356" height="652" rx="32"/>
  <text class="eyebrow" x="82" y="84">EXECUTESOFT AUTH WORKFLOW</text>
  <text class="title" x="82" y="124">Password Reset Email Saga</text>
  <text class="subtitle" x="82" y="154">A resilient async flow: auth owns reset state, notification owns provider delivery, NATS carries success and failure outcomes.</text>

  <g transform="translate(82 210)">
    <text class="section" x="0" y="0">Request and state path</text>
    <text class="section" x="708" y="0">Delivery outcome path</text>

    <path class="main-line" d="M 108 140 H 244"/>
    <path class="main-line" d="M 296 140 H 432"/>
    <path class="main-line" d="M 484 140 H 620"/>
    <path class="main-line" d="M 672 140 H 808"/>
    <path class="main-line" d="M 860 140 H 996"/>
    <path class="main-line" d="M 1048 140 H 1184"/>

    <path class="event-line" d="M 1050 198 C 1038 258 950 300 884 310 H 704"/>
    <path class="event-line" d="M 810 310 H 610"/>
    <path class="fail-line" d="M 1050 82 C 1018 14 908 2 790 28 H 642"/>

    <g>
      <rect class="node" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">1</text>
      <text class="node-title" x="20" y="132">Client</text>
      <text class="node-meta" x="20" y="158">REST request</text>
      <text class="node-small" x="20" y="181">POST</text>
      <text class="node-small" x="20" y="199">/auth/password/forgot</text>
    </g>

    <g transform="translate(188 0)">
      <rect class="node-blue" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">2</text>
      <text class="node-title" x="20" y="132">Gateway</text>
      <text class="node-meta" x="20" y="158">Boundary checks</text>
      <text class="node-small" x="20" y="181">Validate payload</text>
      <text class="node-small" x="20" y="199">Call gRPC</text>
    </g>

    <g transform="translate(376 0)">
      <rect class="node-blue" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">3</text>
      <text class="node-title" x="20" y="132">Auth</text>
      <text class="node-meta" x="20" y="158">Business logic</text>
      <text class="node-small" x="20" y="181">Normalize email</text>
      <text class="node-small" x="20" y="199">Generate token</text>
    </g>

    <g transform="translate(564 0)">
      <rect class="node" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">4</text>
      <text class="node-title" x="20" y="132">Postgres</text>
      <text class="node-meta" x="20" y="158">Durable state</text>
      <text class="node-small" x="20" y="181">Hash token</text>
      <text class="node-small" x="20" y="199">Audit started</text>
    </g>

    <g transform="translate(752 0)">
      <rect class="node-warm" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">5</text>
      <text class="node-title" x="20" y="132">NATS</text>
      <text class="node-meta" x="20" y="158">Email request</text>
      <text class="node-small" x="20" y="181">password_reset</text>
      <text class="node-small" x="20" y="199">core.auth.email</text>
    </g>

    <g transform="translate(940 0)">
      <rect class="node-blue" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">6</text>
      <text class="node-title" x="20" y="132">Notification</text>
      <text class="node-meta" x="20" y="158">Saga worker</text>
      <text class="node-small" x="20" y="181">Render email</text>
      <text class="node-small" x="20" y="199">Use adapter</text>
    </g>

    <g transform="translate(1128 0)">
      <rect class="node" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">7</text>
      <text class="node-title" x="20" y="132">Resend</text>
      <text class="node-meta" x="20" y="158">Provider</text>
      <text class="node-small" x="20" y="181">Send email</text>
      <circle class="pulse" cx="29" cy="204" r="7" fill="#16a34a"/>
      <circle class="pulse-danger" cx="55" cy="204" r="7" fill="#ef4444"/>
    </g>

    <g transform="translate(660 268)">
      <rect class="outcome" x="0" y="0" width="304" height="122" rx="24"/>
      <rect class="badge" x="22" y="22" width="42" height="28" rx="14"/>
      <text class="tiny" x="37" y="41">8</text>
      <text class="node-title" x="82" y="41">Delivery outcome event</text>
      <text class="node-meta" x="22" y="74">core.notification.email.delivery</text>
      <text class="node-small" x="22" y="98">status: succeeded or failed</text>
    </g>

    <g transform="translate(300 268)">
      <rect class="failure" x="0" y="0" width="304" height="122" rx="24"/>
      <rect class="danger-badge" x="22" y="22" width="42" height="28" rx="14"/>
      <text class="tiny" x="37" y="41">9</text>
      <text class="node-title" x="82" y="41">Failure compensation</text>
      <text class="node-meta" x="22" y="74">Retry, alert, or expire challenge</text>
      <text class="node-small" x="22" y="98">Auth state remains owned by Auth</text>
    </g>

    <g transform="translate(520 -18)">
      <rect class="failure" x="0" y="0" width="292" height="96" rx="22"/>
      <rect class="danger-badge" x="20" y="18" width="38" height="26" rx="13"/>
      <text class="tiny" x="34" y="36">!</text>
      <text class="node-title" x="74" y="36">Provider failure path</text>
      <text class="node-small" x="20" y="66">Failure is published, consumer keeps running.</text>
    </g>

    <circle class="packet-a" cx="0" cy="0" r="8"/>
    <circle class="packet-b" cx="0" cy="0" r="6"/>
    <circle class="packet-c" cx="0" cy="0" r="7"/>
    <circle class="packet-d" cx="0" cy="0" r="7"/>
  </g>

  <g transform="translate(82 654)">
    <rect x="0" y="-22" width="130" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <circle cx="18" cy="-5" r="5" fill="#2563eb"/>
    <text class="label" x="32" y="-1">request path</text>
    <rect x="150" y="-22" width="134" height="34" rx="17" fill="#f0fdf4" stroke="#bbf7d0"/>
    <circle cx="168" cy="-5" r="5" fill="#16a34a"/>
    <text class="label" x="182" y="-1">success event</text>
    <rect x="304" y="-22" width="132" height="34" rx="17" fill="#fff1f2" stroke="#fecdd3"/>
    <circle cx="322" cy="-5" r="5" fill="#ef4444"/>
    <text class="label" x="336" y="-1">failure event</text>
  </g>
</svg>
