name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --allow-downgrade
          rustup override set ${{ matrix.rust }}
          rustc --version && cargo --version

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Check formatting
        if: matrix.rust == 'stable'
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Setup bun
        if: matrix.rust == 'stable'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build docs
        if: matrix.rust == 'stable'
        run: bun install --frozen-lockfile --cwd docs && bun run --cwd docs build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-v0.21

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: cargo audit
        run: cargo audit

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-v0.20

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked 2>/dev/null || true

      - name: cargo deny
        run: cargo deny check

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --allow-downgrade -c rust-src
          rustc --version

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked 2>/dev/null || true

      - name: Fuzz test (60s smoke check)
        run: cargo +nightly fuzz run http_parse -- -max_total_time=60 2>&1 || echo "::warning::fuzz test found crashes or failed to run"
