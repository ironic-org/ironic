name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Build docs
        run: npm --prefix docs ci && npm --prefix docs run build

      - name: cargo audit (advisory check)
        if: success() || failure()
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit 2>&1 || echo "::warning::cargo audit found advisories"

      - name: cargo deny (license & duplicate check)
        if: success() || failure()
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          cargo deny check 2>&1 || echo "::warning::cargo deny check failed"

      - name: Fuzz test (60s smoke check)
        if: success() || failure()
        run: |
          rustup toolchain install nightly --allow-downgrade -c rust-src 2>/dev/null || true
          cargo +nightly install cargo-fuzz --locked 2>/dev/null || true
          cargo +nightly fuzz run http_parse -- -max_total_time=60 2>&1 || echo "::warning::fuzz test found crashes or failed to run"
