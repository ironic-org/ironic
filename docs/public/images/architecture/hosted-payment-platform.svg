<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">Hosted payment platform flow</title>
  <desc id="desc">Animated diagram showing product service creating a checkout session, Payment writing Postgres and Redis, hosted checkout loading methods, provider authorization, webhook processing, outbox, and NATS events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="pay" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="1" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="store" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#db2777" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".14" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <style>
      .card { fill: #fff; stroke: #dbe3ef; stroke-width: 1.5; filter: url(#shadow); }
      .panel { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.2; }
      .title { fill: #0f172a; font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #475569; font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #64748b; font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 600 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { fill: none; stroke: #94a3b8; stroke-width: 2.4; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #cbd5e1; stroke-width: 2; marker-end: url(#arrow); }
      .dot { opacity: 0; }
      .dot-pay { fill: url(#pay); }
      .dot-store { fill: url(#store); }
      .dot-warn { fill: #f97316; }
      @keyframes move-a {
        0%, 8% { offset-distance: 0%; opacity: 0; }
        12%, 88% { opacity: 1; }
        96%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes move-b {
        0%, 20% { offset-distance: 0%; opacity: 0; }
        24%, 90% { opacity: 1; }
        98%, 100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes glow {
        0%, 100% { opacity: .22; transform: scale(1); }
        50% { opacity: .72; transform: scale(1.08); }
      }
      @keyframes blink {
        0%, 45%, 100% { opacity: .35; }
        60%, 80% { opacity: 1; }
      }
      #t1 { offset-path: path("M 152 148 C 236 148, 270 148, 354 148"); animation: move-a 7s linear infinite; }
      #t2 { offset-path: path("M 482 148 C 540 108, 596 100, 674 112"); animation: move-a 7s linear infinite .45s; }
      #t3 { offset-path: path("M 482 164 C 550 184, 612 194, 684 208"); animation: move-a 7s linear infinite .7s; }
      #t4 { offset-path: path("M 354 230 C 264 246, 214 302, 170 366"); animation: move-b 7s linear infinite 1.1s; }
      #t5 { offset-path: path("M 170 366 C 248 346, 292 312, 370 250"); animation: move-b 7s linear infinite 1.55s; }
      #t6 { offset-path: path("M 486 250 C 572 292, 608 330, 694 370"); animation: move-b 7s linear infinite 2s; }
      #t7 { offset-path: path("M 826 370 C 908 370, 918 258, 986 218"); animation: move-b 7s linear infinite 2.45s; }
      #t8 { offset-path: path("M 986 250 C 918 312, 910 450, 760 486 C 642 514, 536 484, 464 422"); animation: move-b 7s linear infinite 3s; }
      #t9 { offset-path: path("M 694 486 C 594 486, 520 444, 456 392"); animation: move-b 7s linear infinite 3.45s; }
      #t10 { offset-path: path("M 452 392 C 372 430, 338 502, 250 518"); animation: move-b 7s linear infinite 4s; }
      #paymentGlow { transform-origin: 418px 184px; animation: glow 2.4s ease-in-out infinite; }
      #cacheBlink { animation: blink 2.2s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        #t1, #t2, #t3, #t4, #t5, #t6, #t7, #t8, #t9, #t10, #paymentGlow, #cacheBlink { animation: none; opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1160" height="620" rx="28" fill="url(#bg)" />
  <text x="48" y="56" class="title" font-size="25">Hosted Payment Platform</text>
  <text x="48" y="82" class="label">Product services create checkout sessions; Payment owns provider routing, durable state, cache, callbacks, and events.</text>

  <path class="line" d="M152 148 C236 148 270 148 354 148" />
  <path class="line-soft" d="M482 148 C540 108 596 100 674 112" />
  <path class="line-soft" d="M482 164 C550 184 612 194 684 208" />
  <path class="line" d="M354 230 C264 246 214 302 170 366" />
  <path class="line" d="M170 366 C248 346 292 312 370 250" />
  <path class="line" d="M486 250 C572 292 608 330 694 370" />
  <path class="line" d="M826 370 C908 370 918 258 986 218" />
  <path class="line" d="M986 250 C918 312 910 450 760 486 C642 514 536 484 464 422" />
  <path class="line-soft" d="M694 486 C594 486 520 444 456 392" />
  <path class="line-soft" d="M452 392 C372 430 338 502 250 518" />

  <g transform="translate(48 112)">
    <rect class="card" width="104" height="82" rx="14" />
    <circle cx="28" cy="30" r="13" fill="#dbeafe" />
    <path d="M22 30h12m-6-6v12" stroke="#2563eb" stroke-width="2" stroke-linecap="round" />
    <text x="20" y="60" class="title">Product</text>
    <text x="20" y="76" class="small">order invoice</text>
  </g>

  <g transform="translate(352 108)">
    <circle id="paymentGlow" cx="66" cy="76" r="76" fill="#bfdbfe" />
    <rect class="card" width="132" height="152" rx="18" />
    <circle cx="38" cy="34" r="16" fill="#dcfce7" />
    <path d="M29 34h18m-14-6h10m-10 12h10" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" />
    <text x="24" y="72" class="title">Payment</text>
    <text x="24" y="94" class="small">checkout session</text>
    <rect x="22" y="112" width="88" height="24" rx="12" fill="#eff6ff" stroke="#bfdbfe" />
    <text x="36" y="128" class="tiny">idempotent</text>
  </g>

  <g transform="translate(682 70)">
    <rect class="card" width="142" height="86" rx="15" />
    <ellipse cx="42" cy="28" rx="24" ry="10" fill="#ede9fe" stroke="#8b5cf6" />
    <path d="M18 28v28c0 6 48 6 48 0V28" fill="#f5f3ff" stroke="#8b5cf6" />
    <text x="78" y="33" class="title">Postgres</text>
    <text x="78" y="53" class="small">source of truth</text>
  </g>

  <g transform="translate(690 176)">
    <rect class="card" width="134" height="78" rx="15" />
    <rect id="cacheBlink" x="20" y="22" width="40" height="28" rx="7" fill="#ccfbf1" stroke="#14b8a6" />
    <path d="M25 29h30M25 36h30M25 43h30" stroke="#0f766e" stroke-width="2" stroke-linecap="round" />
    <text x="72" y="34" class="title">Redis</text>
    <text x="72" y="54" class="small">read cache</text>
  </g>

  <g transform="translate(58 338)">
    <rect class="card" width="132" height="94" rx="16" />
    <circle cx="34" cy="32" r="15" fill="#fef3c7" />
    <path d="M27 32h14m-10-6h6m-6 12h6" stroke="#d97706" stroke-width="2" stroke-linecap="round" />
    <text x="22" y="66" class="title">Hosted UI</text>
    <text x="22" y="84" class="small">payment page</text>
  </g>

  <g transform="translate(694 330)">
    <rect class="card" width="132" height="92" rx="16" />
    <circle cx="35" cy="32" r="15" fill="#e0f2fe" />
    <path d="M27 32h16m-8-8v16" stroke="#0284c7" stroke-width="2" stroke-linecap="round" />
    <text x="22" y="66" class="title">Adapter</text>
    <text x="22" y="84" class="small">provider SDK</text>
  </g>

  <g transform="translate(986 174)">
    <rect class="card" width="122" height="100" rx="16" />
    <circle cx="33" cy="32" r="15" fill="#fee2e2" />
    <path d="M25 32h16m-8-8v16" stroke="#dc2626" stroke-width="2" stroke-linecap="round" />
    <text x="22" y="66" class="title">Provider</text>
    <text x="22" y="84" class="small">Stripe bKash</text>
  </g>

  <g transform="translate(686 450)">
    <rect class="card" width="150" height="82" rx="16" />
    <circle cx="32" cy="30" r="14" fill="#ffedd5" />
    <path d="M24 30h16m-6-7l7 7-7 7" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="56" y="34" class="title">Webhook</text>
    <text x="56" y="54" class="small">idempotent</text>
  </g>

  <g transform="translate(336 340)">
    <rect class="card" width="132" height="84" rx="16" />
    <rect x="20" y="22" width="92" height="24" rx="12" fill="#f1f5f9" stroke="#cbd5e1" />
    <text x="38" y="38" class="tiny">outbox row</text>
    <text x="22" y="68" class="title">Outbox</text>
  </g>

  <g transform="translate(120 488)">
    <rect class="card" width="130" height="64" rx="16" />
    <circle cx="32" cy="32" r="20" fill="#111827" />
    <text x="18" y="36" fill="#fff" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="800">NATS</text>
    <text x="62" y="28" class="title">Events</text>
    <text x="62" y="46" class="small">consumers</text>
  </g>

  <g transform="translate(874 72)">
    <rect class="panel" width="214" height="70" rx="16" />
    <circle cx="24" cy="24" r="7" fill="#10b981" />
    <text x="42" y="29" class="small">Postgres keeps durable money state</text>
    <circle cx="24" cy="48" r="7" fill="#14b8a6" />
    <text x="42" y="53" class="small">Redis speeds hosted page reads</text>
  </g>

  <g transform="translate(48 580)">
    <text class="small">Flow: Product creates checkout -> Payment writes Postgres/outbox + caches Redis -> buyer pays on hosted UI -> provider callback -> Payment emits events.</text>
  </g>

  <circle id="t1" class="dot dot-pay" r="8" />
  <circle id="t2" class="dot dot-store" r="8" />
  <circle id="t3" class="dot dot-store" r="8" />
  <circle id="t4" class="dot dot-pay" r="8" />
  <circle id="t5" class="dot dot-pay" r="8" />
  <circle id="t6" class="dot dot-pay" r="8" />
  <circle id="t7" class="dot dot-pay" r="8" />
  <circle id="t8" class="dot dot-warn" r="8" />
  <circle id="t9" class="dot dot-store" r="8" />
  <circle id="t10" class="dot dot-store" r="8" />
</svg>
