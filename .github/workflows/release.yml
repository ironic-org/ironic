name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build docs
        run: bun install --frozen-lockfile --cwd docs && bun run --cwd docs build

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

      - name: cargo deny
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          cargo deny check

      - name: Verify package metadata (dry-run publish)
        run: cargo package --no-verify

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('Cargo.lock') }}

      - name: Publish ironic-macros
        working-directory: crates/ironic-macros
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ironic
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Generate release notes
        id: changelog
        run: |
          echo "## What's Changed" > release-notes.md
          git log --oneline --no-merges $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD >> release-notes.md
          echo "release_notes_file=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
