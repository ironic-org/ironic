# cargo-deny configuration
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip = [
    # ring uses an older getrandom; newer crates use 0.4
    { name = "getrandom", version = "0.2" },
]
skip-tree = [
    # notify depends on an older windows-sys ecosystem
    { name = "notify", version = "8" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
