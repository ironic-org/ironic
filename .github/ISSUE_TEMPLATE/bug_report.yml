name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "rustc 1.85.0"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Ironic Version
      description: Version from Cargo.toml or `cargo metadata`
      placeholder: "0.1.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Create a module with ...
        2. Register provider ...
        3. Run `cargo test` ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Traces
      description: Any relevant error output
      render: shell

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - DI Container
        - Module System
        - HTTP / Routing
        - Axum Adapter
        - Request Pipeline
        - Middleware / Guards / Interceptors
        - Procedural Macros
        - CLI
        - Testing Utilities
        - Documentation
        - Other
