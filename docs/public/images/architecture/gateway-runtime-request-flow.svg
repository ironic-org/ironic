<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Gateway runtime request flow</title>
  <desc id="desc">Animated architecture diagram showing an ExecuteSoft public request flowing from client through Caddy, gateway, auth, tenant context, Redis, and internal services before returning a response.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fee7"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="softShadow" x="-24%" y="-35%" width="148%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="subtleShadow" x="-18%" y="-25%" width="136%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#64748b"/>
    </marker>
    <style>
      .eyebrow { font: 800 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.4px; fill: #2563eb; }
      .title { font: 800 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .node-title { font: 800 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .node-meta { font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .node-small { font: 600 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0; }
      .tiny { font: 800 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .label { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0; }
      .panel { fill: rgba(255, 255, 255, 0.78); stroke: #dbeafe; stroke-width: 1.2; filter: url(#softShadow); }
      .node { fill: #ffffff; stroke: #dbeafe; stroke-width: 1.4; filter: url(#subtleShadow); }
      .node-blue { fill: url(#cardBlue); stroke: #bfdbfe; stroke-width: 1.4; filter: url(#subtleShadow); }
      .node-warm { fill: url(#cardWarm); stroke: #fed7aa; stroke-width: 1.4; filter: url(#subtleShadow); }
      .node-green { fill: url(#cardGreen); stroke: #bbf7d0; stroke-width: 1.4; filter: url(#subtleShadow); }
      .policy { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#subtleShadow); }
      .badge { fill: url(#accent); }
      .main-line { stroke: #2563eb; stroke-width: 4; stroke-linecap: round; fill: none; marker-end: url(#arrowBlue); stroke-dasharray: 14 12; animation: dash 1.7s linear infinite; }
      .event-line { stroke: #64748b; stroke-width: 3; stroke-linecap: round; fill: none; marker-end: url(#arrowSlate); stroke-dasharray: 8 11; animation: dash 2.1s linear infinite; }
      .return-line { stroke: #0891b2; stroke-width: 3.4; stroke-linecap: round; fill: none; marker-end: url(#arrowBlue); stroke-dasharray: 10 10; animation: dash 1.9s linear infinite; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; transform-origin: center; }
      .packet-a { fill: #2563eb; opacity: 0; animation: packetMain 7.6s linear infinite; }
      .packet-b { fill: #0891b2; opacity: 0; animation: packetContext 7.6s linear infinite; animation-delay: 2.8s; }
      .packet-c { fill: #16a34a; opacity: 0; animation: packetReturn 7.6s linear infinite; animation-delay: 4.9s; }
      @keyframes dash { to { stroke-dashoffset: -52; } }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.72; } 50% { transform: scale(1.28); opacity: 1; } }
      @keyframes packetMain {
        0%, 7% { opacity: 0; transform: translate(150px, 350px); }
        10% { opacity: 1; transform: translate(150px, 350px); }
        22% { opacity: 1; transform: translate(338px, 350px); }
        34% { opacity: 1; transform: translate(526px, 350px); }
        46% { opacity: 1; transform: translate(714px, 350px); }
        58% { opacity: 1; transform: translate(902px, 350px); }
        70% { opacity: 1; transform: translate(1090px, 350px); }
        78%, 100% { opacity: 0; transform: translate(1210px, 350px); }
      }
      @keyframes packetContext {
        0%, 37% { opacity: 0; transform: translate(526px, 350px); }
        43% { opacity: 1; transform: translate(526px, 350px); }
        57% { opacity: 1; transform: translate(650px, 510px); }
        71% { opacity: 1; transform: translate(906px, 510px); }
        82%, 100% { opacity: 0; transform: translate(1030px, 350px); }
      }
      @keyframes packetReturn {
        0%, 62% { opacity: 0; transform: translate(1090px, 350px); }
        67% { opacity: 1; transform: translate(1090px, 350px); }
        82% { opacity: 1; transform: translate(620px, 564px); }
        94%, 100% { opacity: 0; transform: translate(150px, 564px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .main-line, .event-line, .return-line, .pulse, .packet-a, .packet-b, .packet-c { animation: none; }
        .packet-a, .packet-b, .packet-c { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1440" height="720" rx="34" fill="url(#page)"/>
  <circle cx="1210" cy="90" r="128" fill="#dbeafe" opacity="0.38"/>
  <circle cx="120" cy="630" r="160" fill="#ccfbf1" opacity="0.28"/>

  <rect class="panel" x="42" y="34" width="1356" height="652" rx="32"/>
  <text class="eyebrow" x="82" y="84">EXECUTESOFT GATEWAY WORKFLOW</text>
  <text class="title" x="82" y="124">Runtime Request Flow</text>
  <text class="subtitle" x="82" y="154">Public traffic enters through Caddy, the gateway enforces security and tenant context, then internal services return a normalized response.</text>

  <g transform="translate(82 210)">
    <text class="section" x="0" y="0">Public edge and gateway path</text>
    <text class="section" x="500" y="292">Tenant context and cache path</text>
    <text class="section" x="780" y="0">Internal service path</text>

    <path class="main-line" d="M 108 140 H 244"/>
    <path class="main-line" d="M 296 140 H 432"/>
    <path class="main-line" d="M 484 140 H 620"/>
    <path class="main-line" d="M 672 140 H 808"/>
    <path class="main-line" d="M 860 140 H 996"/>
    <path class="main-line" d="M 1048 140 H 1184"/>

    <path class="event-line" d="M 445 198 C 480 254 548 286 620 302"/>
    <path class="event-line" d="M 696 302 H 808"/>
    <path class="event-line" d="M 884 302 C 930 284 976 248 1005 198"/>
    <path class="return-line" d="M 1090 212 C 934 412 676 466 410 390 C 294 358 214 380 128 444"/>

    <g>
      <rect class="node" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">1</text>
      <text class="node-title" x="20" y="132">Client</text>
      <text class="node-meta" x="20" y="158">Browser/API</text>
      <text class="node-small" x="20" y="181">HTTPS request</text>
      <text class="node-small" x="20" y="199">tenant domain</text>
    </g>

    <g transform="translate(188 0)">
      <rect class="node-blue" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">2</text>
      <text class="node-title" x="20" y="132">Caddy</text>
      <text class="node-meta" x="20" y="158">TLS edge</text>
      <text class="node-small" x="20" y="181">valid cert</text>
      <text class="node-small" x="20" y="199">private proxy</text>
    </g>

    <g transform="translate(376 0)">
      <rect class="node-blue" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">3</text>
      <text class="node-title" x="20" y="132">Gateway</text>
      <text class="node-meta" x="20" y="158">REST boundary</text>
      <text class="node-small" x="20" y="181">match route</text>
      <text class="node-small" x="20" y="199">body limit</text>
    </g>

    <g transform="translate(564 0)">
      <rect class="node-warm" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">4</text>
      <text class="node-title" x="20" y="132">Auth</text>
      <text class="node-meta" x="20" y="158">Auth mode</text>
      <text class="node-small" x="20" y="181">session/user</text>
      <text class="node-small" x="20" y="199">permission</text>
    </g>

    <g transform="translate(752 0)">
      <rect class="node-green" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">5</text>
      <text class="node-title" x="20" y="132">Context</text>
      <text class="node-meta" x="20" y="158">Tenant lookup</text>
      <text class="node-small" x="20" y="181">org_id/site_id</text>
      <text class="node-small" x="20" y="199">exact domain</text>
    </g>

    <g transform="translate(940 0)">
      <rect class="node-blue" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">6</text>
      <text class="node-title" x="20" y="132">Service</text>
      <text class="node-meta" x="20" y="158">Internal call</text>
      <text class="node-small" x="20" y="181">gRPC route</text>
      <text class="node-small" x="20" y="199">or proxy</text>
    </g>

    <g transform="translate(1128 0)">
      <rect class="node" x="0" y="58" width="132" height="164" rx="22"/>
      <rect class="badge" x="20" y="78" width="36" height="26" rx="13"/>
      <text class="tiny" x="33" y="96">7</text>
      <text class="node-title" x="20" y="132">Response</text>
      <text class="node-meta" x="20" y="158">Public envelope</text>
      <text class="node-small" x="20" y="181">status + data</text>
      <text class="node-small" x="20" y="199">safe errors</text>
      <circle class="pulse" cx="29" cy="204" r="7" fill="#16a34a"/>
    </g>

    <g transform="translate(520 280)">
      <rect class="policy" x="0" y="0" width="176" height="122" rx="24"/>
      <rect class="badge" x="22" y="22" width="42" height="28" rx="14"/>
      <text class="tiny" x="37" y="41">A</text>
      <text class="node-title" x="82" y="41">Tenant DB</text>
      <text class="node-meta" x="22" y="74">Resolve Host</text>
      <text class="node-small" x="22" y="98">domain to org/site</text>
    </g>

    <g transform="translate(760 280)">
      <rect class="policy" x="0" y="0" width="176" height="122" rx="24"/>
      <rect class="badge" x="22" y="22" width="42" height="28" rx="14"/>
      <text class="tiny" x="37" y="41">B</text>
      <text class="node-title" x="82" y="41">Redis</text>
      <text class="node-meta" x="22" y="74">Context cache</text>
      <text class="node-small" x="22" y="98">tenant + CORS</text>
    </g>

    <g transform="translate(288 426)">
      <rect class="node-green" x="0" y="0" width="676" height="96" rx="24"/>
      <rect class="badge" x="22" y="20" width="42" height="28" rx="14"/>
      <text class="tiny" x="37" y="39">8</text>
      <text class="node-title" x="82" y="40">Gateway injects verified internal headers</text>
      <text class="node-meta" x="22" y="70">x-org-id, x-site-id, x-tenant-domain, verified identity, permissions, and request metadata</text>
    </g>

    <circle class="packet-a" cx="0" cy="0" r="8"/>
    <circle class="packet-b" cx="0" cy="0" r="7"/>
    <circle class="packet-c" cx="0" cy="0" r="7"/>
  </g>

  <g transform="translate(82 654)">
    <rect x="0" y="-22" width="124" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <circle cx="18" cy="-5" r="5" fill="#2563eb"/>
    <text class="label" x="32" y="-1">request path</text>
    <rect x="144" y="-22" width="142" height="34" rx="17" fill="#f8fafc" stroke="#cbd5e1"/>
    <circle cx="162" cy="-5" r="5" fill="#64748b"/>
    <text class="label" x="176" y="-1">context/cache</text>
    <rect x="306" y="-22" width="132" height="34" rx="17" fill="#f0fdf4" stroke="#bbf7d0"/>
    <circle cx="324" cy="-5" r="5" fill="#16a34a"/>
    <text class="label" x="338" y="-1">response</text>
  </g>
</svg>
