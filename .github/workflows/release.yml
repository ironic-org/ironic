name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  github-release:
    name: GitHub Release
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          # Extract the section for this release version
          awk "/^## \[${VERSION#v}\]/{p=1; next} /^## \[/{if(p) exit} p" CHANGELOG.md > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          generate_release_notes: true
          make_latest: true

  publish-crates-io:
    name: Publish to crates.io
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish ironic-macros
        run: cargo publish -p ironic-macros --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true

      - name: Publish ironic
        run: cargo publish -p ironic --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true
